<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensagem Recebida com Sucesso! | Base Exata Consultoria</title>
  <meta name="description" content="Agradecemos o seu contato. Entraremos em contato com você o mais rápido possível.">
  <meta name="robots" content="noindex, nofollow">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'navy': '#1A365D',
            'navy-light': '#234782',
            'navy-dark': '#0F2340',
            'brick': '#D35400',
            'brick-light': '#E8731A',
            'brick-dark': '#A84300',
            'snow': '#F8F9FA',
            'teal': '#008080',
            'teal-light': '#00A3A3',
            'graphite': '#2C3E50',
            'graphite-light': '#5D7083',
          },
          fontFamily: {
            'heading': ['Montserrat', 'sans-serif'],
            'body': ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    
    /* Hero gradient identical to the main page */
    .hero-gradient {
      background: linear-gradient(135deg, #1A365D 0%, #234782 40%, #0F2340 100%);
    }

    /* Grid pulse background matching index.html */
    @keyframes gridPulse {
      0%, 100% { opacity: 0.03; }
      50% { opacity: 0.07; }
    }
    .hero-grid {
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridPulse 6s ease-in-out infinite;
    }

    /* SVG animations for checkmark */
    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }
    .animate-circle {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .animate-check {
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: drawCheck 0.6s cubic-bezier(0.65, 0, 0.45, 1) 0.4s forwards;
    }

    /* Custom Entry Animation for the card */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-card {
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* WhatsApp Pulse effect for the high conversion button */
    @keyframes pulse-whatsapp {
      0%, 100% { transform: scale(1); box-shadow: 0 10px 25px -5px rgba(37, 211, 102, 0.4); }
      50% { transform: scale(1.02); box-shadow: 0 15px 35px -5px rgba(37, 211, 102, 0.6); }
    }
    .whatsapp-pulse-btn {
      animation: pulse-whatsapp 2s ease-in-out infinite;
      transition: all 0.3s ease;
    }
    .whatsapp-pulse-btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="bg-navy-dark min-h-screen flex items-center justify-center p-4 overflow-hidden relative">

  <!-- Background overlay grid and blur lights to match main landing page style -->
  <div class="hero-gradient absolute inset-0 pointer-events-none"></div>
  <div class="hero-grid absolute inset-0 pointer-events-none"></div>
  <div class="absolute top-0 right-0 w-[400px] h-[400px] bg-brick/5 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="absolute bottom-0 left-0 w-[450px] h-[450px] bg-teal/5 rounded-full blur-[120px] pointer-events-none"></div>

  <!-- Central Card -->
  <div class="w-full max-w-lg bg-white/95 backdrop-blur-md rounded-3xl p-8 sm:p-10 shadow-2xl border border-white/20 animate-card relative z-10 text-center">
    
    <!-- Success Icon Container -->
    <div class="flex justify-center mb-6">
      <div class="w-20 h-20 bg-teal/10 rounded-full flex items-center justify-center animate-circle">
        <!-- SVG check icon with draw animation -->
        <svg class="w-10 h-10 text-teal" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
          <path class="animate-check" stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      </div>
    </div>

    <!-- Headers & Content -->
    <h1 class="font-heading font-800 text-2xl sm:text-3xl text-navy mb-4 tracking-tight">
      Sua solicitação foi enviada!
    </h1>
    <p class="font-body text-graphite-light text-base leading-relaxed mb-8 max-w-md mx-auto">
      Obrigado por entrar em contato com a <strong class="text-navy font-semibold">Base Exata</strong>. Analisaremos seus dados e entraremos em contato em até <span class="text-brick font-semibold">24 horas</span>.
    </p>

    <!-- Separator Line -->
    <div class="w-16 h-1 bg-brick/20 mx-auto mb-8 rounded-full"></div>

    <!-- Buttons Section -->
    <div class="space-y-4">
      <!-- WhatsApp Premium Button (Primary CTA) -->
      <a href="https://api.whatsapp.com/send?phone=551999917531&text=Ol%C3%A1%2C%20acabei%20de%20preencher%20o%20formul%C3%A1rio%20no%20site%20da%20Base%20Exata%20e%20gostaria%20de%20conversar."
         target="_blank" rel="noopener noreferrer"
         class="whatsapp-pulse-btn w-full bg-[#25D366] hover:bg-[#20ba5a] text-white font-heading font-bold text-base px-6 py-4 rounded-xl flex items-center justify-center gap-3">
        <!-- WhatsApp Icon -->
        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Quero acelerar! Falar pelo WhatsApp
      </a>

      <!-- Back Button -->
      <a href="index.html"
         class="w-full inline-flex items-center justify-center gap-2 bg-snow hover:bg-navy/5 text-navy font-heading font-semibold text-sm px-6 py-3.5 rounded-xl border border-navy/10 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Voltar para o site
      </a>
    </div>

    <!-- Small footer local badge -->
    <p class="font-body text-xs text-graphite-light/40 mt-8">
      Base Exata Consultoria &bull; Capivari, SP
    </p>

  </div>

</body>
</html>
